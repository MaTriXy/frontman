# =============================================================================
# Alertmanager Configuration - Frontman Production
# Deployed to /etc/alertmanager/alertmanager.yml
#
# Routes all alerts to alertmanager-discord which forwards to the
# #prod-alerts Discord channel via webhook.
# =============================================================================

global:
  resolve_timeout: 5m

# Route configuration
route:
  receiver: discord
  group_by: [alertname]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts: shorter wait and repeat
    - match:
        severity: critical
      receiver: discord
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h

# Receivers
receivers:
  - name: discord
    webhook_configs:
      - url: http://127.0.0.1:9095
        send_resolved: true

# Inhibition rules: suppress DiskSpaceWarning when DiskSpaceCritical fires for the same partition
inhibit_rules:
  - source_match:
      alertname: DiskSpaceCritical
    target_match:
      alertname: DiskSpaceWarning
    equal: [instance, mountpoint]
